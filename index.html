<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva - Restaurante de Pablo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería oficial de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">

    <header class="bg-[#E60000] text-white py-6 text-center border-b-8 border-black">
        <h1 class="text-5xl font-black uppercase italic tracking-wider">Restaurante de Pablo</h1>
        <p class="mt-2 font-bold uppercase">Reserva tu mesa al instante</p>
    </header>

    <main class="max-w-xl mx-auto mt-8 px-4 pb-10">
        <div class="bg-white p-6 md:p-8 rounded-xl border-4 border-black shadow-[6px_6px_0px_#E60000]">
            <h2 class="text-3xl font-black uppercase mb-6 text-[#E60000] border-b-4 border-black pb-2 text-center">Tu Reserva</h2>
            <div class="space-y-4 font-bold">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1">Día</label>
                        <input type="date" id="input-fecha" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]">
                    </div>
                    <div>
                        <label class="block mb-1">Hora</label>
                        <!-- DESPLEGABLE DE HORAS -->
                        <select id="input-hora" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]"></select>
                    </div>
                </div>

                <!-- CÓDIGO A PRUEBA DE BOMBAS PARA LAS HORAS: SE EJECUTA INSTANTÁNEAMENTE -->
                <script>
                    const selectHora = document.getElementById('input-hora');
                    let opcionesHTML = "";
                    for(let h = 8; h <= 22; h++) {
                        let hora = h < 10 ? '0' + h : h; // Añade el 0 si es menor de 10 (08, 09...)
                        opcionesHTML += `<option value="${hora}:00">${hora}:00</option>`;
                        opcionesHTML += `<option value="${hora}:15">${hora}:15</option>`;
                        opcionesHTML += `<option value="${hora}:30">${hora}:30</option>`;
                        opcionesHTML += `<option value="${hora}:45">${hora}:45</option>`;
                    }
                    opcionesHTML += `<option value="23:00">23:00</option>`;
                    selectHora.innerHTML = opcionesHTML;
                    document.getElementById('input-fecha').valueAsDate = new Date(); // Pone el día de hoy por defecto
                </script>

                <div>
                    <label class="block mb-1">¿Dónde quieres comer?</label>
                    <select id="input-zona" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]">
                        <option value="Interior">Interior</option>
                        <option value="Terraza">Terraza</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-1">Nombre Completo</label>
                    <input type="text" id="input-nombre" placeholder="Ej: Pablo Gómez" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]">
                </div>
                <div>
                    <label class="block mb-1">Teléfono</label>
                    <input type="tel" id="input-telefono" placeholder="Ej: 600123456" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]">
                </div>

                <button onclick="procesarReserva()" id="btn-reservar" class="mt-8 w-full bg-black text-white font-black text-2xl py-4 rounded border-2 border-black uppercase active:scale-95 transition">
                    Confirmar Reserva
                </button>
            </div>
        </div>
    </main>

    <script>
        // CONEXIÓN A SUPABASE
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TELEGRAM_BOT_TOKEN = '8789184996:AAFV2JsCWBcXo-IhC0YYzQuEhuhWPUgHK6k';
        const TELEGRAM_CHAT_ID = '6519651464';

        // LÓGICA DE LA RESERVA (Se guarda en Base de Datos)
        async function procesarReserva() {
            const fecha = document.getElementById('input-fecha').value;
            const hora = document.getElementById('input-hora').value;
            const zona = document.getElementById('input-zona').value;
            const nombre = document.getElementById('input-nombre').value;
            const telefono = document.getElementById('input-telefono').value;

            if(!fecha || !hora || !nombre || !telefono) {
                return alert("⚠️ Rellena todos los campos, por favor.");
            }

            const btn = document.getElementById('btn-reservar');
            btn.innerHTML = 'Procesando...';
            btn.disabled = true;

            try {
                // 1. Buscar todas las mesas de la zona que quiere el cliente
                const { data: mesasZona, error: errMesas } = await supabase.from('mesas').select('id').eq('zona', zona);
                if (errMesas || !mesasZona) throw errMesas || new Error("No hay mesas");

                // 2. Buscar las reservas que ya hay en ese día
                const { data: reservasDia, error: errRes } = await supabase.from('reservas').select('mesa_id, hora_inicio').eq('fecha', fecha);
                if (errRes) throw errRes;

                const horaSolicitada = new Date(`${fecha}T${hora}:00`);
                let mesaAsignada = null;

                // 3. Buscar una mesa disponible (respetando las 2.5 horas = 150 minutos)
                for (let mesa of mesasZona) {
                    const reservasDeEstaMesa = reservasDia.filter(r => r.mesa_id === mesa.id);
                    
                    const tieneChoque = reservasDeEstaMesa.some(r => {
                        const horaReservaExitente = new Date(`${fecha}T${r.hora_inicio}`);
                        const diferenciaMinutos = Math.abs((horaSolicitada - horaReservaExitente) / 60000);
                        return diferenciaMinutos < 150; 
                    });

                    // Si no choca, nos guardamos esta mesa y paramos de buscar
                    if (!tieneChoque) {
                        mesaAsignada = mesa;
                        break;
                    }
                }

                // Si no hay ninguna libre
                if(!mesaAsignada) {
                    alert(`❌ Lo sentimos, no quedan mesas libres en ${zona} a las ${hora}.`);
                    btn.innerHTML = 'Confirmar Reserva';
                    btn.disabled = false;
                    return;
                }

                // 4. GUARDAR EN LA BASE DE DATOS LA MESA ASIGNADA
                const { error: insertError } = await supabase.from('reservas').insert([{
                    mesa_id: mesaAsignada.id, 
                    nombre_cliente: nombre,
                    telefono_cliente: telefono, 
                    fecha: fecha, 
                    hora_inicio: hora + ':00'
                }]);

                if (insertError) throw insertError;

                // 5. Enviar mensaje por Telegram con el ID de la mesa asignada
                const mesaIDCorto = mesaAsignada.id.substring(0, 4).toUpperCase(); // Cogemos 4 letras del ID para identificarla
                const msg = `🍔 *NUEVA RESERVA* 🍔\n👤 *Nombre:* ${nombre}\n📞 *Tlf:* ${telefono}\n📅 *Día:* ${fecha}\n⏰ *Hora:* ${hora}\n📍 *Zona:* ${zona}\n🪑 *Mesa Asignada:* REF-${mesaIDCorto}`;
                
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });

                // Confirmación
                alert(`✅ ¡Éxito! Tienes la mesa REF-${mesaIDCorto} reservada en ${zona} a las ${hora}.`);
                window.location.reload(); 

            } catch (err) {
                console.error("Error:", err);
                alert("❌ Error al guardar en la base de datos.");
                btn.innerHTML = 'Confirmar Reserva';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
