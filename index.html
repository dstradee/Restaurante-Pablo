<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Restaurante de Pablo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pablo-red': '#E60000',
                        'pablo-yellow': '#FFF9E6',
                        'pablo-white': '#FFFFFF',
                    },
                    fontFamily: {
                        'fastfood': ['"Impact"', '"Arial Black"', 'sans-serif'],
                        'body': ['"Arial"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .card-shadow { box-shadow: 6px 6px 0px rgba(230, 0, 0, 1); }
        .btn-shadow { box-shadow: 4px 4px 0px rgba(0, 0, 0, 1); transition: all 0.1s; }
        .btn-shadow:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px rgba(0, 0, 0, 1); }
        .mesa-disponible:hover { border-color: #E60000; cursor: pointer; transform: scale(1.05); transition: 0.2s;}
        .mesa-seleccionada { background-color: #E60000; color: white; border-color: black; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #E60000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-pablo-yellow min-h-screen font-body text-gray-900 pb-10">

    <header class="bg-pablo-red text-pablo-white py-6 text-center border-b-8 border-black">
        <h1 class="text-5xl md:text-6xl font-fastfood uppercase italic tracking-wider">Restaurante de Pablo</h1>
        <p class="mt-2 text-xl font-bold uppercase tracking-widest">¡Reserva tu mesa rápido!</p>
    </header>

    <main class="max-w-3xl mx-auto mt-8 px-4">
        <div class="bg-pablo-white p-6 md:p-8 rounded-xl border-4 border-black card-shadow">
            
            <!-- Paso 1: Filtros -->
            <div id="step-1" class="mb-8">
                <h2 class="text-2xl font-fastfood uppercase mb-4 text-pablo-red border-b-2 border-pablo-red pb-2">1. ¿Cuándo vienes?</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-bold mb-1">Día</label>
                        <input type="date" id="input-fecha" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Hora</label>
                        <select id="input-hora" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                            <option value="">Selecciona hora</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="20:30">20:30</option>
                            <option value="21:00">21:00</option>
                            <option value="21:30">21:30</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Comensales</label>
                        <input type="number" id="input-comensales" min="1" max="20" value="2" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                    </div>
                </div>
                <button onclick="buscarMesasDisponibles()" id="btn-buscar" class="mt-6 w-full bg-black text-pablo-white font-fastfood text-2xl py-4 rounded border-2 border-black btn-shadow uppercase tracking-wider flex items-center justify-center gap-2">
                    <span>Buscar Mesas</span>
                </button>
            </div>

            <!-- Paso 2: Mapa -->
            <div id="step-2" class="hidden mb-8">
                <h2 class="text-2xl font-fastfood uppercase mb-4 text-pablo-red border-b-2 border-pablo-red pb-2">2. Elige tu Mesa</h2>
                <div id="mapa-mesas" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <!-- Mesas renderizadas desde Supabase -->
                </div>
            </div>

            <!-- Paso 3: Datos -->
            <div id="step-3" class="hidden">
                <h2 class="text-2xl font-fastfood uppercase mb-4 text-pablo-red border-b-2 border-pablo-red pb-2">3. Tus Datos</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-1">Nombre y Apellido</label>
                        <input type="text" id="input-nombre" placeholder="Ej: Pablo Gómez" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Teléfono Móvil</label>
                        <input type="tel" id="input-telefono" placeholder="Ej: 600123456" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                    </div>
                </div>
                <button onclick="confirmarReserva()" id="btn-confirmar" class="mt-6 w-full bg-pablo-red text-pablo-white font-fastfood text-3xl py-4 rounded border-2 border-black btn-shadow uppercase tracking-wider">
                    ¡Confirmar Reserva!
                </button>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURACIÓN REAL SUPABASE
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Variables
        let restauranteId = null;
        let mesasActuales = [];
        let mesaSeleccionadaId = null;
        let mesaSeleccionadaNumero = null;
        let zonaSeleccionada = null;

        document.getElementById('input-fecha').valueAsDate = new Date();

        // Obtener el ID del restaurante al cargar
        async function inicializarRestaurante() {
            const { data, error } = await supabase.from('restaurantes').select('id').eq('slug', 'restaurante-de-pablo').single();
            if(data) restauranteId = data.id;
        }
        inicializarRestaurante();

        async function buscarMesasDisponibles() {
            const fecha = document.getElementById('input-fecha').value;
            const hora = document.getElementById('input-hora').value;
            const comensales = parseInt(document.getElementById('input-comensales').value);

            if(!fecha || !hora || !comensales) {
                alert("¡Faltan datos (fecha, hora o comensales)!");
                return;
            }
            if(!restauranteId) {
                alert("Cargando conexión... Intenta de nuevo en 1 segundo.");
                return;
            }

            const btn = document.getElementById('btn-buscar');
            btn.innerHTML = '<div class="loader"></div> Buscando...';
            
            // Consultar TODAS las mesas del restaurante a Supabase real
            const { data: mesas, error } = await supabase
                .from('mesas')
                .select('*')
                .eq('restaurante_id', restauranteId)
                .order('numero_mesa', { ascending: true });

            btn.innerHTML = '<span>Buscar Mesas</span>';

            if (error) {
                console.error("Error al buscar mesas:", error);
                alert("Error conectando con la base de datos.");
                return;
            }

            mesasActuales = mesas;
            renderizarMapa(comensales);
            document.getElementById('step-2').classList.remove('hidden');
            
            iniciarRealtime();
        }

        function renderizarMapa(comensalesRequeridos) {
            const contenedor = document.getElementById('mapa-mesas');
            contenedor.innerHTML = '';

            mesasActuales.forEach(mesa => {
                // Validación estricta según el PDF: Debe estar 'libre' y tener la capacidad suficiente
                const esApta = mesa.estado_actual === 'libre' && mesa.capacidad >= comensalesRequeridos;
                
                const div = document.createElement('div');
                div.id = `mesa-${mesa.id}`;
                div.className = `p-4 border-4 rounded-lg text-center font-bold flex flex-col items-center justify-center h-24 transition-all
                    ${esApta ? 'border-gray-300 mesa-disponible bg-white text-gray-800' : 'border-gray-200 bg-gray-100 text-gray-400 opacity-60 cursor-not-allowed'}`;
                
                div.innerHTML = `
                    <span class="text-xl">Mesa ${mesa.numero_mesa}</span>
                    <span class="text-xs uppercase bg-black text-white px-2 py-1 rounded mt-1">${mesa.zona}</span>
                    <span class="text-xs mt-1">👤 Máx: ${mesa.capacidad}</span>
                `;

                if (esApta) {
                    div.onclick = () => seleccionarMesa(mesa.id, mesa.numero_mesa, mesa.zona);
                }

                contenedor.appendChild(div);
            });
        }

        function seleccionarMesa(id, numero, zona) {
            if (mesaSeleccionadaId) {
                const anterior = document.getElementById(`mesa-${mesaSeleccionadaId}`);
                if(anterior) anterior.classList.remove('mesa-seleccionada');
            }

            mesaSeleccionadaId = id;
            mesaSeleccionadaNumero = numero;
            zonaSeleccionada = zona;
            const actual = document.getElementById(`mesa-${id}`);
            actual.classList.add('mesa-seleccionada');

            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('step-3').scrollIntoView({ behavior: 'smooth' });
        }

        async function confirmarReserva() {
            const nombre = document.getElementById('input-nombre').value;
            const telefono = document.getElementById('input-telefono').value;
            const fecha = document.getElementById('input-fecha').value;
            const hora = document.getElementById('input-hora').value;

            if(!nombre || !telefono) {
                alert("Por favor, dinos tu nombre y teléfono.");
                return;
            }

            const btn = document.getElementById('btn-confirmar');
            btn.innerHTML = '<div class="loader"></div> Procesando...';
            btn.disabled = true;

            try {
                // 1. Insertar reserva real en Supabase
                const { error: errorInsert } = await supabase.from('reservas').insert([
                    {
                        restaurante_id: restauranteId,
                        mesa_id: mesaSeleccionadaId,
                        nombre_cliente: nombre,
                        telefono_cliente: telefono,
                        fecha: fecha,
                        hora_inicio: hora + ':00', // Formato de base de datos SQL
                        estado: 'pendiente'
                    }
                ]);

                if(errorInsert) throw errorInsert;

                // 2. Muta estado de la mesa a 'reservada' (para bloquearla a los demás)
                const { error: errorUpdate } = await supabase.from('mesas')
                    .update({ estado_actual: 'reservada' })
                    .eq('id', mesaSeleccionadaId);

                if(errorUpdate) throw errorUpdate;

                alert("¡BOMBA! 🍔 Tu reserva en el Restaurante de Pablo ha sido confirmada en la base de datos.");
                window.location.reload(); 

            } catch (err) {
                console.error("Error al reservar", err);
                alert("Ups. Hubo un problema al guardar la reserva en la base de datos.");
                btn.innerHTML = '¡Confirmar Reserva!';
                btn.disabled = false;
            }
        }

        // SUSCRIPCIÓN EN TIEMPO REAL (Punto 3.3 del PDF)
        function iniciarRealtime() {
            supabase
              .channel('cambios-mesas-público')
              .on(
                'postgres_changes',
                { event: 'UPDATE', schema: 'public', table: 'mesas' },
                (payload) => {
                  const mesaActualizada = payload.new;
                  const idx = mesasActuales.findIndex(m => m.id === mesaActualizada.id);
                  
                  if(idx !== -1) {
                      mesasActuales[idx].estado_actual = mesaActualizada.estado_actual;
                      const comensales = parseInt(document.getElementById('input-comensales').value);
                      renderizarMapa(comensales);
                      
                      // Si nos han robado la mesa mientras la mirábamos
                      if(mesaActualizada.id === mesaSeleccionadaId && mesaActualizada.estado_actual !== 'libre') {
                          alert("¡Atención! Alguien se te acaba de adelantar y ha reservado/ocupado esta mesa. Por favor, elige otra.");
                          document.getElementById('step-3').classList.add('hidden');
                          mesaSeleccionadaId = null;
                      }
                  }
                }
              )
              .subscribe();
        }
    </script>
</body>
</html>
