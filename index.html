<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Restaurante de Pablo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#FFF9E6] min-h-screen pb-10 text-gray-900 font-sans">

    <header class="bg-[#E60000] text-white py-6 text-center border-b-8 border-black">
        <h1 class="text-5xl font-black uppercase italic tracking-wider">Restaurante de Pablo</h1>
        <p class="mt-2 font-bold uppercase">Reserva tu mesa al instante</p>
    </header>

    <main class="max-w-xl mx-auto mt-8 px-4">
        <div class="bg-white p-6 md:p-8 rounded-xl border-4 border-black" style="box-shadow: 6px 6px 0px #E60000;">
            <h2 class="text-3xl font-black uppercase mb-6 text-[#E60000] border-b-4 border-black pb-2 text-center">Tu Reserva</h2>
            <div class="space-y-4 font-bold">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1">Día</label>
                        <input type="date" id="input-fecha" class="w-full border-2 border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-[#E60000]">
                    </div>
                    <div>
                        <label class="block mb-1">Hora (Cada 15m)</label>
                        <select id="input-hora" class="w-full border-2 border-black p-3 rounded"></select>
                    </div>
                </div>

                <div>
                    <label class="block mb-1">¿Dónde quieres la mesa?</label>
                    <select id="input-zona" class="w-full border-2 border-black p-3 rounded">
                        <option value="Interior">Interior</option>
                        <option value="Terraza">Terraza</option>
                        <option value="Segunda Planta">Segunda Planta</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-1">Nombre Completo</label>
                    <input type="text" id="input-nombre" placeholder="Ej: Pablo Gómez" class="w-full border-2 border-black p-3 rounded">
                </div>
                <div>
                    <label class="block mb-1">Teléfono</label>
                    <input type="tel" id="input-telefono" placeholder="Ej: 600123456" class="w-full border-2 border-black p-3 rounded">
                </div>

                <button onclick="procesarReserva()" id="btn-reservar" class="mt-8 w-full bg-black text-white font-black text-2xl py-4 rounded border-2 border-black uppercase transition transform active:translate-y-1 hover:bg-gray-800">
                    Confirmar Reserva
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TELEGRAM_BOT_TOKEN = '8789184996:AAFV2JsCWBcXo-IhC0YYzQuEhuhWPUgHK6k';
        const TELEGRAM_CHAT_ID = '6519651464';

        // 1. Generar Horas cada 15 minutos (Almuerzo y Cena)
        const selectHora = document.getElementById('input-hora');
        function generarHoras() {
            const horas = [];
            for(let h=13; h<=15; h++) ['00','15','30','45'].forEach(m => horas.push(`${h}:${m}`));
            for(let h=20; h<=23; h++) ['00','15','30','45'].forEach(m => horas.push(`${h}:${m}`));
            selectHora.innerHTML = horas.map(h => `<option value="${h}">${h}</option>`).join('');
        }
        generarHoras();
        document.getElementById('input-fecha').valueAsDate = new Date();

        async function procesarReserva() {
            const fecha = document.getElementById('input-fecha').value;
            const hora = document.getElementById('input-hora').value;
            const zona = document.getElementById('input-zona').value;
            const nombre = document.getElementById('input-nombre').value;
            const telefono = document.getElementById('input-telefono').value;

            if(!fecha || !hora || !nombre || !telefono) return alert("⚠️ Rellena todos los campos.");

            const btn = document.getElementById('btn-reservar');
            btn.innerHTML = 'Buscando Mesa...';
            btn.disabled = true;

            try {
                // Obtener ID del restaurante
                const { data: rest } = await supabase.from('restaurantes').select('id').eq('slug', 'restaurante-de-pablo').single();
                if(!rest) throw new Error("Restaurante no encontrado en BD.");

                // Comprobar reservas de ESE DÍA para no solapar 1 hora
                const { data: reservasDia } = await supabase.from('reservas').select('mesa_id, hora_inicio').eq('fecha', fecha).in('estado', ['pendiente', 'asistida']);
                
                // Filtrar mesas que ya están ocupadas en el rango de 1 hora (-59m a +59m)
                const reqTime = new Date(`${fecha}T${hora}:00`);
                const mesasBloqueadasIds = (reservasDia || []).filter(r => {
                    const resTime = new Date(`${fecha}T${r.hora_inicio}`);
                    const diffMinutos = Math.abs((reqTime - resTime) / 60000);
                    return diffMinutos < 60; // Hay choque de 1 hora
                }).map(r => r.mesa_id);

                // Buscar TODAS las mesas de esa zona
                const { data: mesasZona } = await supabase.from('mesas').select('*').eq('restaurante_id', rest.id).eq('zona', zona).order('numero_mesa');

                // Nos quedamos con la primera que NO esté en la lista de bloqueadas
                const mesaAsignada = mesasZona.find(m => !mesasBloqueadasIds.includes(m.id));

                if(!mesaAsignada) {
                    alert(`❌ Lo sentimos, TODAS las mesas de ${zona} están reservadas a las ${hora}. Prueba otra hora u otra zona.`);
                    btn.innerHTML = 'Confirmar Reserva';
                    btn.disabled = false;
                    return;
                }

                // Guardar la reserva
                await supabase.from('reservas').insert([{
                    restaurante_id: rest.id, mesa_id: mesaAsignada.id, nombre_cliente: nombre,
                    telefono_cliente: telefono, fecha: fecha, hora_inicio: hora + ':00', estado: 'pendiente'
                }]);

                // Si la reserva es para HOY y falta MENOS DE 1 HORA, bloqueamos la mesa físicamente
                const ahora = new Date();
                if(fecha === ahora.toISOString().split('T')[0]) {
                    const diff = (reqTime - ahora) / 60000;
                    if(diff > -60 && diff <= 60) {
                        await supabase.from('mesas').update({ estado_actual: 'reservada' }).eq('id', mesaAsignada.id);
                    }
                }

                // Telegram
                const fechaEspanol = fecha.split('-').reverse().join('/');
                const msg = `🍔 *NUEVA RESERVA ONLINE* 🍔\n----------------------------\n👤 *Cliente:* ${nombre}\n📞 *Teléfono:* ${telefono}\n📅 *Fecha:* ${fechaEspanol}\n⏰ *Hora:* ${hora}\n📍 *Zona:* ${zona}\n✅ *MESA ASIGNADA: ${mesaAsignada.numero_mesa}*\n----------------------------`;
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });

                alert(`✅ ¡Reserva confirmada!\nTienes la Mesa ${mesaAsignada.numero_mesa}.`);
                window.location.reload(); 

            } catch (err) {
                console.error(err);
                alert("❌ Fallo de conexión. Inténtalo de nuevo.");
                btn.innerHTML = 'Confirmar Reserva';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
