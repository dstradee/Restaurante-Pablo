<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Restaurante de Pablo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pablo-red': '#E60000',
                        'pablo-yellow': '#FFF9E6',
                        'pablo-white': '#FFFFFF',
                    },
                    fontFamily: {
                        'fastfood': ['"Impact"', '"Arial Black"', 'sans-serif'],
                        'body': ['"Arial"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .card-shadow { box-shadow: 6px 6px 0px rgba(230, 0, 0, 1); }
        .btn-shadow { box-shadow: 4px 4px 0px rgba(0, 0, 0, 1); transition: all 0.1s; }
        .btn-shadow:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px rgba(0, 0, 0, 1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #E60000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-pablo-yellow min-h-screen font-body text-gray-900 pb-10">

    <header class="bg-pablo-red text-pablo-white py-6 text-center border-b-8 border-black">
        <h1 class="text-5xl md:text-6xl font-fastfood uppercase italic tracking-wider">Restaurante de Pablo</h1>
        <p class="mt-2 text-xl font-bold uppercase tracking-widest">Reserva tu mesa al instante</p>
    </header>

    <main class="max-w-xl mx-auto mt-8 px-4">
        <div class="bg-pablo-white p-6 md:p-8 rounded-xl border-4 border-black card-shadow">
            
            <h2 class="text-3xl font-fastfood uppercase mb-6 text-pablo-red border-b-4 border-black pb-2 text-center">Datos de la Reserva</h2>
            
            <div class="space-y-4">
                <!-- Fila 1: Fecha y Hora -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-1">Día</label>
                        <input type="date" id="input-fecha" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Hora</label>
                        <select id="input-hora" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                            <option value="">Selecciona</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="20:30">20:30</option>
                            <option value="21:00">21:00</option>
                            <option value="21:30">21:30</option>
                        </select>
                    </div>
                </div>

                <!-- Fila 2: Zona -->
                <div>
                    <label class="block font-bold mb-1">¿Dónde quieres la mesa?</label>
                    <select id="input-zona" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                        <option value="Interior">Interior</option>
                        <option value="Terraza">Terraza</option>
                        <option value="Segunda Planta">Segunda Planta</option>
                    </select>
                </div>

                <!-- Fila 3: Datos de Contacto -->
                <div>
                    <label class="block font-bold mb-1">Nombre Completo</label>
                    <input type="text" id="input-nombre" placeholder="Ej: Pablo Gómez" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                </div>
                <div>
                    <label class="block font-bold mb-1">Teléfono</label>
                    <input type="tel" id="input-telefono" placeholder="Ej: 600123456" class="w-full border-2 border-black p-3 rounded font-bold focus:outline-none focus:ring-2 focus:ring-pablo-red">
                </div>

                <!-- Botón de Confirmar -->
                <button onclick="procesarReserva()" id="btn-reservar" class="mt-8 w-full bg-black text-pablo-white font-fastfood text-3xl py-4 rounded border-2 border-black btn-shadow uppercase tracking-wider">
                    Confirmar Reserva
                </button>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURACIÓN TELEGRAM
        const TELEGRAM_BOT_TOKEN = '8789184996:AAFV2JsCWBcXo-IhC0YYzQuEhuhWPUgHK6k';
        const TELEGRAM_CHAT_ID = '6519651464';

        // Poner la fecha de hoy por defecto
        document.getElementById('input-fecha').valueAsDate = new Date();

        // Función para transformar YYYY-MM-DD a DD/MM/YYYY
        function formatearFechaEspanol(fechaSQL) {
            const partes = fechaSQL.split('-');
            if(partes.length !== 3) return fechaSQL;
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        async function procesarReserva() {
            const fecha = document.getElementById('input-fecha').value;
            const hora = document.getElementById('input-hora').value;
            const zona = document.getElementById('input-zona').value;
            const nombre = document.getElementById('input-nombre').value;
            const telefono = document.getElementById('input-telefono').value;

            // Validaciones básicas
            if(!fecha || !hora || !nombre || !telefono) {
                alert("⚠️ Por favor, rellena todos los campos antes de confirmar.");
                return;
            }

            const btn = document.getElementById('btn-reservar');
            btn.innerHTML = '<div class="loader"></div> Enviando...';
            btn.disabled = true;

            try {
                // 1. Formateamos la fecha al estilo español (Día/Mes/Año)
                const fechaEspanol = formatearFechaEspanol(fecha);

                // 2. Preparamos el mensaje exacto para Telegram
                const textoTelegram = 
`🍔 *NUEVA RESERVA ONLINE* 🍔
-----------------------------------------
👤 *Cliente:* ${nombre}
📞 *Teléfono:* ${telefono}
📅 *Fecha:* ${fechaEspanol}
⏰ *Hora:* ${hora}
📍 *Zona elegida:* ${zona}
-----------------------------------------`;

                // 3. Enviamos el mensaje directo a la API de Telegram
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: textoTelegram,
                        parse_mode: 'Markdown'
                    })
                });

                if(!response.ok) {
                    throw new Error("Fallo al enviar a Telegram");
                }

                // 4. Éxito
                alert("✅ ¡Tu reserva se ha enviado correctamente! Te esperamos.");
                window.location.reload(); // Recargar la página para limpiar el formulario

            } catch (err) {
                console.error("Error:", err);
                alert("❌ Hubo un problema de conexión. Inténtalo de nuevo.");
                btn.innerHTML = 'Confirmar Reserva';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
