<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Aforo - Camareros</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <header class="bg-black py-4 px-6 flex justify-between items-center border-b-2 border-gray-700">
        <h1 class="text-2xl font-black uppercase text-yellow-400">Control de Aforo</h1>
        <span id="estado-conexion" class="text-yellow-400 font-bold text-sm">● Conectando...</span>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6 mt-4">
        
        <!-- TARJETA INTERIOR -->
        <div class="bg-gray-800 p-6 rounded-2xl border-4 border-gray-700 text-center">
            <h2 class="text-3xl font-black text-blue-400 uppercase mb-2">Salón Interior</h2>
            <div class="text-6xl font-black mb-6" id="contador-interior">Cargando...</div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="ocuparMesa('Interior')" class="bg-red-600 hover:bg-red-500 text-white text-xl font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">
                    + Sentar Cliente
                </button>
                <button onclick="liberarMesa('Interior')" class="bg-green-600 hover:bg-green-500 text-white text-xl font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">
                    - Liberar Mesa
                </button>
            </div>
        </div>

        <!-- TARJETA TERRAZA -->
        <div class="bg-gray-800 p-6 rounded-2xl border-4 border-gray-700 text-center">
            <h2 class="text-3xl font-black text-orange-400 uppercase mb-2">Terraza</h2>
            <div class="text-6xl font-black mb-6" id="contador-terraza">Cargando...</div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="ocuparMesa('Terraza')" class="bg-red-600 hover:bg-red-500 text-white text-xl font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">
                    + Sentar Cliente
                </button>
                <button onclick="liberarMesa('Terraza')" class="bg-green-600 hover:bg-green-500 text-white text-xl font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">
                    - Liberar Mesa
                </button>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mesasCache = [];

        // 1. Cargar las mesas
        async function cargarDatos() {
            try {
                const { data, error } = await supabase.from('mesas').select('*');
                if (error) throw error;
                
                mesasCache = data || [];
                actualizarContadores();
                
                document.getElementById('estado-conexion').innerHTML = '● Vivo (Conectado)';
                document.getElementById('estado-conexion').className = 'text-green-400 font-bold text-sm';
            } catch (error) {
                console.error("Fallo al cargar datos:", error);
                document.getElementById('contador-interior').innerHTML = `<span class="text-red-500 text-3xl">Error BD</span>`;
                document.getElementById('contador-terraza').innerHTML = `<span class="text-red-500 text-3xl">Error BD</span>`;
                document.getElementById('estado-conexion').innerHTML = '● Error de Red';
                document.getElementById('estado-conexion').className = 'text-red-500 font-bold text-sm';
            }
        }

        // 2. Pintar los números en pantalla
        function actualizarContadores() {
            const interiorLibres = mesasCache.filter(m => m.zona === 'Interior' && m.estado_actual === 'libre').length;
            const interiorTotal = mesasCache.filter(m => m.zona === 'Interior').length;
            
            const terrazaLibres = mesasCache.filter(m => m.zona === 'Terraza' && m.estado_actual === 'libre').length;
            const terrazaTotal = mesasCache.filter(m => m.zona === 'Terraza').length;

            document.getElementById('contador-interior').innerHTML = `<span class="text-white">${interiorLibres}</span> <span class="text-2xl text-gray-400">/ ${interiorTotal} libres</span>`;
            document.getElementById('contador-terraza').innerHTML = `<span class="text-white">${terrazaLibres}</span> <span class="text-2xl text-gray-400">/ ${terrazaTotal} libres</span>`;
        }

        // 3. El camarero sienta a alguien (Resta una mesa libre)
        async function ocuparMesa(zona) {
            const mesaLibre = mesasCache.find(m => m.zona === zona && m.estado_actual === 'libre');
            if(!mesaLibre) return alert(`⚠️ ¡Aforo lleno! No quedan mesas libres en ${zona}.`);
            
            // Actualizar local instantáneo
            mesaLibre.estado_actual = 'ocupada';
            actualizarContadores();

            // Guardar en BD
            await supabase.from('mesas').update({ estado_actual: 'ocupada' }).eq('id', mesaLibre.id);
        }

        // 4. El camarero limpia una mesa (Suma una mesa libre)
        async function liberarMesa(zona) {
            const mesaOcupada = mesasCache.find(m => m.zona === zona && m.estado_actual !== 'libre');
            if(!mesaOcupada) return alert(`⚠️ ¡Todas las mesas de ${zona} ya están vacías!`);

            // Actualizar local instantáneo
            mesaOcupada.estado_actual = 'libre';
            actualizarContadores();

            // Guardar en BD
            await supabase.from('mesas').update({ estado_actual: 'libre' }).eq('id', mesaOcupada.id);
        }

        // 5. Escuchar cambios de la web de reservas en tiempo real (Supabase Realtime)
        supabase.channel('camareros-vivo')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'mesas' }, () => {
              cargarDatos(); 
          })
          .subscribe();

        // Arrancar la app
        cargarDatos();
    </script>
</body>
</html>
