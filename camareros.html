<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Camareros - Restaurante de Pablo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-10 font-sans">

    <!-- CABECERA FIJA CON NAVEGACIÓN -->
    <header class="bg-black py-4 px-4 border-b-2 border-gray-700 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black uppercase text-yellow-400">Control de Local</h1>
            <div class="text-right leading-none">
                <span id="reloj" class="text-white font-black text-xl block">00:00</span>
                <span id="estado-conexion" class="text-yellow-400 font-bold text-xs uppercase tracking-widest">● Esperando Red...</span>
            </div>
        </div>

        <!-- PESTAÑAS PARA CAMBIAR DE VISTA -->
        <div class="flex gap-2">
            <button onclick="cambiarPestaña('aforo')" id="tab-aforo" class="flex-1 bg-yellow-400 text-black font-black py-2 rounded uppercase text-sm border-2 border-transparent transition">
                Control de Aforo
            </button>
            <button onclick="cambiarPestaña('reservas')" id="tab-reservas" class="flex-1 bg-gray-800 text-gray-400 font-bold py-2 rounded uppercase text-sm border-2 border-gray-700 transition">
                Listado Reservas
            </button>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto mt-2">
        
        <!-- ============================================== -->
        <!-- VISTA 1: AFORO Y MESAS EN VIVO                 -->
        <!-- ============================================== -->
        <div id="vista-aforo" class="space-y-6 block">
            <!-- TARJETA INTERIOR -->
            <div class="bg-gray-800 p-6 rounded-3xl border-4 border-gray-700 text-center shadow-lg">
                <h2 class="text-3xl font-black text-blue-400 uppercase mb-1">Interior</h2>
                <p class="text-gray-400 font-bold mb-4 uppercase text-xs tracking-widest">Mesas Libres Ahora</p>
                <div class="text-7xl font-black mb-6" id="contador-interior">
                    -- <span class="text-3xl text-gray-500">/ 20</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="ocuparMesa('Interior')" id="btn-oc-int" class="bg-red-600 active:bg-red-800 text-white text-xl font-black py-5 rounded-2xl uppercase shadow-[0_4px_0px_#991b1b] active:shadow-none active:translate-y-1 transition">
                        ⬇️ Ocupar
                    </button>
                    <button onclick="liberarMesa('Interior')" id="btn-lib-int" class="bg-green-600 active:bg-green-800 text-white text-xl font-black py-5 rounded-2xl uppercase shadow-[0_4px_0px_#166534] active:shadow-none active:translate-y-1 transition">
                        ⬆️ Liberar
                    </button>
                </div>
            </div>

            <!-- TARJETA TERRAZA -->
            <div class="bg-gray-800 p-6 rounded-3xl border-4 border-gray-700 text-center shadow-lg">
                <h2 class="text-3xl font-black text-orange-400 uppercase mb-1">Terraza</h2>
                <p class="text-gray-400 font-bold mb-4 uppercase text-xs tracking-widest">Mesas Libres Ahora</p>
                <div class="text-7xl font-black mb-6" id="contador-terraza">
                    -- <span class="text-3xl text-gray-500">/ 20</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="ocuparMesa('Terraza')" id="btn-oc-ter" class="bg-red-600 active:bg-red-800 text-white text-xl font-black py-5 rounded-2xl uppercase shadow-[0_4px_0px_#991b1b] active:shadow-none active:translate-y-1 transition">
                        ⬇️ Ocupar
                    </button>
                    <button onclick="liberarMesa('Terraza')" id="btn-lib-ter" class="bg-green-600 active:bg-green-800 text-white text-xl font-black py-5 rounded-2xl uppercase shadow-[0_4px_0px_#166534] active:shadow-none active:translate-y-1 transition">
                        ⬆️ Liberar
                    </button>
                </div>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- VISTA 2: LISTADO DE RESERVAS POR DÍA           -->
        <!-- ============================================== -->
        <div id="vista-reservas" class="hidden space-y-6">
            
            <div class="bg-gray-800 p-4 rounded-xl border-2 border-gray-700">
                <label class="block text-gray-400 font-bold mb-2 uppercase text-sm tracking-widest">Ver reservas del día:</label>
                <input type="date" id="filtro-fecha" onchange="cargarListaReservas()" class="w-full bg-gray-900 border-2 border-gray-600 p-3 rounded text-white font-bold focus:outline-none focus:border-yellow-400 text-lg">
            </div>

            <!-- Aquí se imprimirán las reservas ordenadas -->
            <div id="contenedor-lista-reservas" class="space-y-4">
                <p class="text-center text-gray-500 font-bold">Cargando reservas...</p>
            </div>

        </div>

    </main>

    <script>
        // --- RELOJ ---
        setInterval(() => {
            const d = new Date();
            document.getElementById('reloj').innerText = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // --- SISTEMA DE PESTAÑAS ---
        function cambiarPestaña(pestaña) {
            const vAforo = document.getElementById('vista-aforo');
            const vReservas = document.getElementById('vista-reservas');
            const tAforo = document.getElementById('tab-aforo');
            const tReservas = document.getElementById('tab-reservas');

            if (pestaña === 'aforo') {
                vAforo.classList.remove('hidden');
                vReservas.classList.add('hidden');
                
                tAforo.className = "flex-1 bg-yellow-400 text-black font-black py-2 rounded uppercase text-sm border-2 border-transparent transition";
                tReservas.className = "flex-1 bg-gray-800 text-gray-400 font-bold py-2 rounded uppercase text-sm border-2 border-gray-700 transition";
            } else {
                vAforo.classList.add('hidden');
                vReservas.classList.remove('hidden');
                
                tReservas.className = "flex-1 bg-yellow-400 text-black font-black py-2 rounded uppercase text-sm border-2 border-transparent transition";
                tAforo.className = "flex-1 bg-gray-800 text-gray-400 font-bold py-2 rounded uppercase text-sm border-2 border-gray-700 transition";
                
                cargarListaReservas(); // Cargar la lista al entrar a la pestaña
            }
        }

        // --- INICIALIZACIÓN SEGURA DE SUPABASE ---
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        let supabase = null;
        let mesasCache = [];
        let reservasHoyCache = [];

        // Este código arranca todo SOLO cuando detecta que la librería se ha descargado de internet
        document.addEventListener('DOMContentLoaded', () => {
            const chequeo = setInterval(() => {
                if (window.supabase) {
                    clearInterval(chequeo);
                    iniciarApp();
                }
            }, 200); // Comprueba cada 0.2 segundos si ya hay internet
        });

        function iniciarApp() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Ponemos el input de fecha a hoy
            const hoy = new Date();
            document.getElementById('filtro-fecha').value = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;

            cargarDatosAforo();
            
            // Suscripción al tiempo real
            supabase.channel('camareros-canal-seguro')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'mesas' }, payload => { cargarDatosAforo(); })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas' }, payload => { cargarDatosAforo(); cargarListaReservas(); })
                .subscribe();

            // Refresco de seguridad cada 60 segundos por si se desconecta
            setInterval(cargarDatosAforo, 60000);
        }

        // ==========================================
        // LÓGICA DE LA VISTA DE AFORO
        // ==========================================
        async function cargarDatosAforo() {
            if(!supabase) return;
            const estado = document.getElementById('estado-conexion');
            try {
                estado.innerHTML = '● Conectando...';
                estado.className = 'text-yellow-400 font-bold text-xs uppercase tracking-widest';

                const ahora = new Date();
                const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;

                const { data: respMesas, error: errMesas } = await supabase.from('mesas').select('*');
                if (errMesas) throw errMesas;

                const { data: respReservas, error: errRes } = await supabase.from('reservas').select('mesa_id, hora_inicio').eq('fecha', hoyIso);
                if (errRes) throw errRes;

                mesasCache = respMesas || [];
                reservasHoyCache = respReservas || [];

                actualizarPantallaAforo(ahora, hoyIso);

                estado.innerHTML = '● EN LÍNEA';
                estado.className = 'text-green-400 font-bold text-xs uppercase tracking-widest';
            } catch (error) {
                estado.innerHTML = '● SIN SEÑAL';
                estado.className = 'text-red-500 font-bold text-xs uppercase tracking-widest';
            }
        }

        function actualizarPantallaAforo(ahora, hoyIso) {
            let libresInt = 0; let totalInt = 0;
            let libresTer = 0; let totalTer = 0;

            mesasCache.forEach(mesa => {
                if(mesa.zona === 'Interior') totalInt++;
                if(mesa.zona === 'Terraza') totalTer++;

                let estaLibreFisicamente = (mesa.estado_actual === 'libre');
                let reservasMesa = reservasHoyCache.filter(r => r.mesa_id === mesa.id);
                let estaReservadaAhora = reservasMesa.some(r => {
                    let horaReserva = new Date(`${hoyIso}T${r.hora_inicio}`);
                    return Math.abs((ahora - horaReserva) / 60000) < 150;
                });

                if(estaLibreFisicamente && !estaReservadaAhora) {
                    if(mesa.zona === 'Interior') libresInt++;
                    if(mesa.zona === 'Terraza') libresTer++;
                }
            });

            document.getElementById('contador-interior').innerHTML = `<span class="${libresInt===0 ? 'text-red-500' : 'text-white'}">${libresInt}</span> <span class="text-3xl text-gray-500">/ ${totalInt}</span>`;
            document.getElementById('contador-terraza').innerHTML = `<span class="${libresTer===0 ? 'text-red-500' : 'text-white'}">${libresTer}</span> <span class="text-3xl text-gray-500">/ ${totalTer}</span>`;
        }

        async function ocuparMesa(zona) {
            if(!supabase) return;
            const ahora = new Date();
            const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;

            const mesaOcupar = mesasCache.find(mesa => {
                if (mesa.zona !== zona || mesa.estado_actual !== 'libre') return false;
                let reservas = reservasHoyCache.filter(r => r.mesa_id === mesa.id);
                return !reservas.some(r => Math.abs((ahora - new Date(`${hoyIso}T${r.hora_inicio}`)) / 60000) < 150);
            });

            if(!mesaOcupar) return alert(`⚠️ ¡No quedan mesas en ${zona}!`);

            try {
                await supabase.from('mesas').update({ estado_actual: 'ocupada' }).eq('id', mesaOcupar.id);
                cargarDatosAforo();
            } catch (err) {}
        }

        async function liberarMesa(zona) {
            if(!supabase) return;
            const mesaLib = mesasCache.find(mesa => mesa.zona === zona && mesa.estado_actual === 'ocupada');
            if(!mesaLib) return alert(`⚠️ No hay mesas ocupadas físicamente en ${zona}.`);

            try {
                await supabase.from('mesas').update({ estado_actual: 'libre' }).eq('id', mesaLib.id);
                cargarDatosAforo();
            } catch (err) {}
        }

        // ==========================================
        // LÓGICA DE LA VISTA DE RESERVAS POR DÍA
        // ==========================================
        async function cargarListaReservas() {
            if(!supabase) return;
            const fechaSelec = document.getElementById('filtro-fecha').value;
            const contenedor = document.getElementById('contenedor-lista-reservas');

            contenedor.innerHTML = '<p class="text-center text-yellow-400 font-bold mt-4">Buscando en la base de datos...</p>';

            try {
                // Buscamos todas las reservas de ese día, y pedimos que nos traiga también la ZONA de la mesa
                const { data: reservasDia, error } = await supabase
                    .from('reservas')
                    .select('hora_inicio, nombre_cliente, telefono_cliente, mesas(zona)')
                    .eq('fecha', fechaSelec)
                    .order('hora_inicio', { ascending: true }); // Ordenadas de mañana a noche

                if (error) throw error;

                if (!reservasDia || reservasDia.length === 0) {
                    contenedor.innerHTML = `<div class="bg-gray-800 border-2 border-gray-700 p-6 rounded-xl text-center"><p class="text-xl font-bold text-gray-500">No hay ninguna reserva para este día.</p></div>`;
                    return;
                }

                // Agrupamos por horas y pintamos el HTML
                let html = "";
                let horaActual = "";

                reservasDia.forEach(res => {
                    let horaCorta = res.hora_inicio.substring(0, 5); // Ej: 14:30
                    
                    // Si es una hora nueva, ponemos un separador gigante
                    if (horaCorta !== horaActual) {
                        html += `<div class="mt-8 mb-2 border-b-2 border-gray-600 pb-1">
                                    <h3 class="text-3xl font-black text-yellow-400">${horaCorta}</h3>
                                 </div>`;
                        horaActual = horaCorta;
                    }

                    // Tarjeta de la reserva
                    let zona = res.mesas ? res.mesas.zona : "Sin Zona";
                    let colorZona = zona === 'Interior' ? 'text-blue-400' : 'text-orange-400';

                    html += `
                        <div class="bg-gray-800 p-4 rounded-xl border-l-4 border-yellow-400 shadow flex flex-col md:flex-row justify-between md:items-center gap-2 mb-3">
                            <div>
                                <p class="text-xl font-black uppercase text-white">${res.nombre_cliente}</p>
                                <p class="text-gray-400 font-bold">📞 ${res.telefono_cliente}</p>
                            </div>
                            <div class="bg-gray-900 px-4 py-2 rounded border border-gray-700 text-center">
                                <span class="block text-xs text-gray-500 uppercase font-black">Zona</span>
                                <span class="text-lg font-black uppercase ${colorZona}">${zona}</span>
                            </div>
                        </div>
                    `;
                });

                contenedor.innerHTML = html;

            } catch (err) {
                console.error(err);
                contenedor.innerHTML = '<p class="text-center text-red-500 font-bold mt-4">❌ Error al cargar las reservas. Revisa tu internet.</p>';
            }
        }
    </script>
</body>
</html>
