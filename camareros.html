<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Camareros - Restaurante de Pablo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-10">

    <header class="bg-black py-4 px-6 flex justify-between items-center border-b-2 border-gray-700 sticky top-0 z-10">
        <h1 class="text-2xl font-black uppercase text-yellow-400">Control Aforo</h1>
        <div class="text-right">
            <span id="reloj" class="text-white font-bold text-lg block">00:00</span>
            <span id="estado-conexion" class="text-yellow-400 font-bold text-xs">● Iniciando...</span>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-8 mt-4">
        <!-- TARJETA INTERIOR -->
        <div class="bg-gray-800 p-6 rounded-3xl border-4 border-gray-700 text-center shadow-2xl">
            <h2 class="text-4xl font-black text-blue-400 uppercase mb-2">Interior</h2>
            <p class="text-gray-400 font-bold mb-4 uppercase text-sm tracking-widest">Mesas Disponibles Ahora</p>
            
            <div class="text-7xl font-black mb-8" id="contador-interior">
                -- <span class="text-3xl text-gray-500">/ 20</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="ocuparMesa('Interior')" id="btn-oc-int" class="bg-red-600 hover:bg-red-500 text-white text-xl md:text-2xl font-black py-6 rounded-2xl shadow-[0_6px_0px_#991b1b] active:shadow-none active:translate-y-2 transition uppercase">
                    ⬇️ Ocupar
                </button>
                <button onclick="liberarMesa('Interior')" id="btn-lib-int" class="bg-green-600 hover:bg-green-500 text-white text-xl md:text-2xl font-black py-6 rounded-2xl shadow-[0_6px_0px_#166534] active:shadow-none active:translate-y-2 transition uppercase">
                    ⬆️ Liberar
                </button>
            </div>
        </div>

        <!-- TARJETA TERRAZA -->
        <div class="bg-gray-800 p-6 rounded-3xl border-4 border-gray-700 text-center shadow-2xl">
            <h2 class="text-4xl font-black text-orange-400 uppercase mb-2">Terraza</h2>
            <p class="text-gray-400 font-bold mb-4 uppercase text-sm tracking-widest">Mesas Disponibles Ahora</p>
            
            <div class="text-7xl font-black mb-8" id="contador-terraza">
                -- <span class="text-3xl text-gray-500">/ 20</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="ocuparMesa('Terraza')" id="btn-oc-ter" class="bg-red-600 hover:bg-red-500 text-white text-xl md:text-2xl font-black py-6 rounded-2xl shadow-[0_6px_0px_#991b1b] active:shadow-none active:translate-y-2 transition uppercase">
                    ⬇️ Ocupar
                </button>
                <button onclick="liberarMesa('Terraza')" id="btn-lib-ter" class="bg-green-600 hover:bg-green-500 text-white text-xl md:text-2xl font-black py-6 rounded-2xl shadow-[0_6px_0px_#166534] active:shadow-none active:translate-y-2 transition uppercase">
                    ⬆️ Liberar
                </button>
            </div>
        </div>
    </main>

    <script>
        // RELOJ EN TIEMPO REAL
        setInterval(() => {
            const d = new Date();
            document.getElementById('reloj').innerText = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }, 1000);

        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        let supabase = null;
        
        let mesasCache = [];
        let reservasHoyCache = [];

        async function cargarDatos() {
            if(!supabase) return;
            const estado = document.getElementById('estado-conexion');
            try {
                estado.innerHTML = '● Actualizando...';
                estado.className = 'text-yellow-400 font-bold text-xs';

                const ahora = new Date();
                const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;

                const { data: respMesas, error: errMesas } = await supabase.from('mesas').select('*');
                if (errMesas) throw errMesas;

                const { data: respReservas, error: errRes } = await supabase.from('reservas').select('mesa_id, hora_inicio').eq('fecha', hoyIso);
                if (errRes) throw errRes;

                mesasCache = respMesas || [];
                reservasHoyCache = respReservas || [];

                actualizarPantalla(ahora, hoyIso);

                estado.innerHTML = '● Conectado';
                estado.className = 'text-green-400 font-bold text-xs';
            } catch (error) {
                console.error(error);
                estado.innerHTML = '● Error Red';
                estado.className = 'text-red-500 font-bold text-xs';
            }
        }

        function actualizarPantalla(ahora, hoyIso) {
            let libresInt = 0; let totalInt = 0;
            let libresTer = 0; let totalTer = 0;

            mesasCache.forEach(mesa => {
                if(mesa.zona === 'Interior') totalInt++;
                if(mesa.zona === 'Terraza') totalTer++;

                let estaLibreFisicamente = (mesa.estado_actual === 'libre');
                let reservasDeEstaMesa = reservasHoyCache.filter(r => r.mesa_id === mesa.id);
                let estaReservadaAhora = reservasDeEstaMesa.some(r => {
                    let horaReserva = new Date(`${hoyIso}T${r.hora_inicio}`);
                    return Math.abs((ahora - horaReserva) / 60000) < 150;
                });

                if(estaLibreFisicamente && !estaReservadaAhora) {
                    if(mesa.zona === 'Interior') libresInt++;
                    if(mesa.zona === 'Terraza') libresTer++;
                }
            });

            document.getElementById('contador-interior').innerHTML = `<span class="${libresInt===0 ? 'text-red-500' : 'text-white'}">${libresInt}</span> <span class="text-3xl text-gray-500">/ ${totalInt}</span>`;
            document.getElementById('contador-terraza').innerHTML = `<span class="${libresTer===0 ? 'text-red-500' : 'text-white'}">${libresTer}</span> <span class="text-3xl text-gray-500">/ ${totalTer}</span>`;
        }

        async function ocuparMesa(zona) {
            if(!supabase) return alert("❌ Sin conexión a la Base de Datos.");
            const ahora = new Date();
            const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;

            const mesaParaOcupar = mesasCache.find(mesa => {
                if (mesa.zona !== zona || mesa.estado_actual !== 'libre') return false;
                let reservasMesa = reservasHoyCache.filter(r => r.mesa_id === mesa.id);
                let chocan = reservasMesa.some(r => Math.abs((ahora - new Date(`${hoyIso}T${r.hora_inicio}`)) / 60000) < 150);
                return !chocan; 
            });

            if(!mesaParaOcupar) return alert(`⚠️ ¡No quedan mesas en ${zona}! Las libres están esperando una reserva inminente.`);

            try {
                await supabase.from('mesas').update({ estado_actual: 'ocupada' }).eq('id', mesaParaOcupar.id);
                cargarDatos();
            } catch (err) { alert("❌ Error al ocupar."); }
        }

        async function liberarMesa(zona) {
            if(!supabase) return alert("❌ Sin conexión a la Base de Datos.");
            const mesaParaLiberar = mesasCache.find(mesa => mesa.zona === zona && mesa.estado_actual === 'ocupada');
            if(!mesaParaLiberar) return alert(`⚠️ No hay mesas ocupadas físicamente en ${zona}.`);

            try {
                await supabase.from('mesas').update({ estado_actual: 'libre' }).eq('id', mesaParaLiberar.id);
                cargarDatos();
            } catch (err) { alert("❌ Error al liberar."); }
        }

        // ESPERAMOS A QUE CARGUE LA PÁGINA PARA CONECTAR (Evita el cuelgue)
        window.onload = () => {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                cargarDatos();
                setInterval(cargarDatos, 30000);  // Actualiza solo cada 30 seg
                
                supabase.channel('camareros-vivo')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'mesas' }, payload => { cargarDatos(); })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas' }, payload => { cargarDatos(); })
                    .subscribe();
            } else {
                document.getElementById('estado-conexion').innerHTML = '● Error Librería';
                document.getElementById('estado-conexion').className = 'text-red-500 font-bold text-xs';
            }
        };
    </script>
</body>
</html>
