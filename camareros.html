<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camareros - Restaurante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans pb-20">

    <header class="bg-black py-4 px-4 border-b-2 border-gray-700 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black uppercase text-yellow-400">Panel Camareros</h1>
            <span id="estado" class="text-yellow-400 font-bold text-sm uppercase">Cargando...</span>
        </div>
        
        <div class="flex gap-2">
            <button onclick="verPestaña('aforo')" id="tab-aforo" class="flex-1 bg-yellow-400 text-black font-black py-3 rounded uppercase text-sm">
                Aforo en Vivo
            </button>
            <button onclick="verPestaña('reservas')" id="tab-reservas" class="flex-1 bg-gray-800 text-gray-400 font-bold py-3 rounded uppercase text-sm border-2 border-gray-700">
                Lista Reservas
            </button>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto mt-2">
        
        <div id="vista-aforo" class="space-y-6 block">
            <!-- INTERIOR -->
            <div class="bg-gray-800 p-6 rounded-2xl border-2 border-gray-600 text-center">
                <h2 class="text-3xl font-black text-blue-400 uppercase mb-2">Interior</h2>
                <p class="text-gray-400 font-bold text-sm uppercase mb-4">Mesas Libres Ahora Mismo</p>
                
                <div class="text-7xl font-black mb-6" id="num-interior">
                    - <span class="text-4xl text-gray-500">/ -</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="ocupar('Interior')" id="btn-oc-int" class="bg-red-600 active:bg-red-800 text-white text-xl font-black py-6 rounded-xl uppercase shadow-lg transition">
                        Ocupar
                    </button>
                    <button onclick="liberar('Interior')" id="btn-lib-int" class="bg-green-600 active:bg-green-800 text-white text-xl font-black py-6 rounded-xl uppercase shadow-lg transition">
                        Liberar
                    </button>
                </div>
            </div>

            <!-- TERRAZA -->
            <div class="bg-gray-800 p-6 rounded-2xl border-2 border-gray-600 text-center">
                <h2 class="text-3xl font-black text-orange-400 uppercase mb-2">Terraza</h2>
                <p class="text-gray-400 font-bold text-sm uppercase mb-4">Mesas Libres Ahora Mismo</p>
                
                <div class="text-7xl font-black mb-6" id="num-terraza">
                    - <span class="text-4xl text-gray-500">/ -</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="ocupar('Terraza')" id="btn-oc-ter" class="bg-red-600 active:bg-red-800 text-white text-xl font-black py-6 rounded-xl uppercase shadow-lg transition">
                        Ocupar
                    </button>
                    <button onclick="liberar('Terraza')" id="btn-lib-ter" class="bg-green-600 active:bg-green-800 text-white text-xl font-black py-6 rounded-xl uppercase shadow-lg transition">
                        Liberar
                    </button>
                </div>
            </div>
        </div>

        <div id="vista-reservas" class="hidden space-y-4">
            <div class="bg-gray-800 p-4 rounded-xl border-2 border-gray-600">
                <label class="block text-gray-400 font-bold mb-2 uppercase text-sm">Selecciona el día:</label>
                <!-- ESTÉTICA MÓVIL: p-1 h-10 text-sm para achicar el cuadrado en móvil -->
                <input type="date" id="input-fecha-lista" onchange="descargarListaReservas()" class="w-full bg-gray-900 border-2 border-gray-500 p-1 px-2 h-10 text-sm md:h-auto md:p-4 rounded text-white font-bold focus:outline-none md:text-xl">
            </div>

            <div id="caja-reservas" class="space-y-4 mt-4">
                <p class="text-center font-bold text-gray-500">Haz clic en el calendario para buscar reservas...</p>
            </div>
        </div>

    </main>

    <script>
        function verPestaña(cual) {
            if (cual === 'aforo') {
                document.getElementById('vista-aforo').classList.remove('hidden');
                document.getElementById('vista-reservas').classList.add('hidden');
                document.getElementById('tab-aforo').className = "flex-1 bg-yellow-400 text-black font-black py-3 rounded uppercase text-sm";
                document.getElementById('tab-reservas').className = "flex-1 bg-gray-800 text-gray-400 font-bold py-3 rounded uppercase text-sm border-2 border-gray-700";
            } else {
                document.getElementById('vista-aforo').classList.add('hidden');
                document.getElementById('vista-reservas').classList.remove('hidden');
                document.getElementById('tab-reservas').className = "flex-1 bg-yellow-400 text-black font-black py-3 rounded uppercase text-sm";
                document.getElementById('tab-aforo').className = "flex-1 bg-gray-800 text-gray-400 font-bold py-3 rounded uppercase text-sm border-2 border-gray-700";
                
                if(!document.getElementById('input-fecha-lista').value) {
                    const d = new Date();
                    document.getElementById('input-fecha-lista').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                }
                
                if(typeof descargarListaReservas === "function") descargarListaReservas();
            }
        }
    </script>

    <script>
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        
        let todasLasMesas = [];
        let reservasDeHoy = [];

        async function actualizarDatos() {
            try {
                document.getElementById('estado').innerText = "Actualizando...";
                
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const d = new Date();
                const hoy = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

                const resMesas = await supabase.from('mesas').select('*');
                if (resMesas.error) throw resMesas.error;
                todasLasMesas = resMesas.data || [];

                const resReservas = await supabase.from('reservas').select('*').eq('fecha', hoy);
                if (resReservas.error) throw resReservas.error;
                reservasDeHoy = resReservas.data || [];

                pintarNumerosAforo(d, hoy);

                document.getElementById('estado').innerText = "✓ ONLINE";
                document.getElementById('estado').className = "text-green-400 font-bold text-sm uppercase";
            } catch (error) {
                document.getElementById('estado').innerText = "❌ RECONECTANDO...";
                document.getElementById('estado').className = "text-red-500 font-bold text-sm uppercase";
            }
        }

        function pintarNumerosAforo(ahora, hoyIso) {
            let intLibres = 0; let intTotal = 0;
            let terLibres = 0; let terTotal = 0;

            todasLasMesas.forEach(mesa => {
                if (mesa.zona === 'Interior') intTotal++;
                if (mesa.zona === 'Terraza') terTotal++;

                let esLibreFisica = (mesa.estado_actual === 'libre');
                let chocanConInternet = reservasDeHoy.some(r => {
                    if (r.mesa_id !== mesa.id) return false;
                    let horaDeReserva = new Date(`${hoyIso}T${r.hora_inicio}`);
                    return Math.abs((ahora - horaDeReserva) / 60000) < 150; 
                });

                if (esLibreFisica && !chocanConInternet) {
                    if (mesa.zona === 'Interior') intLibres++;
                    if (mesa.zona === 'Terraza') terLibres++;
                }
            });

            document.getElementById('num-interior').innerHTML = `<span class="${intLibres===0 ? 'text-red-500' : 'text-white'}">${intLibres}</span> <span class="text-4xl text-gray-500">/ ${intTotal}</span>`;
            document.getElementById('num-terraza').innerHTML = `<span class="${terLibres===0 ? 'text-red-500' : 'text-white'}">${terLibres}</span> <span class="text-4xl text-gray-500">/ ${terTotal}</span>`;
        }

        async function ocupar(zona) {
            const btn = (zona === 'Interior') ? document.getElementById('btn-oc-int') : document.getElementById('btn-oc-ter');
            const textoPrevio = btn.innerText;
            btn.innerText = "⏳...";

            try {
                const ahora = new Date();
                const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;

                let mesaParaSentar = todasLasMesas.find(mesa => {
                    if (mesa.zona !== zona || mesa.estado_actual !== 'libre') return false;
                    let chocan = reservasDeHoy.some(r => {
                        if (r.mesa_id !== mesa.id) return false;
                        let horaDeReserva = new Date(`${hoyIso}T${r.hora_inicio}`);
                        return Math.abs((ahora - horaDeReserva) / 60000) < 150; 
                    });
                    return !chocan; 
                });

                if (!mesaParaSentar) {
                    btn.innerText = textoPrevio;
                    return alert(`❌ ¡No quedan mesas libres en ${zona}! Las que ves están reservadas por internet.`);
                }

                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await supabase.from('mesas').update({ estado_actual: 'ocupada' }).eq('id', mesaParaSentar.id);
                
                await actualizarDatos();
            } catch (error) {
                alert("❌ Fallo de red. Inténtalo de nuevo.");
            }
            btn.innerText = textoPrevio;
        }

        // EL BOTÓN LIBERAR AHORA BORRA RESERVAS SI NO HAY GENTE FÍSICA
        async function liberar(zona) {
            const btn = (zona === 'Interior') ? document.getElementById('btn-lib-int') : document.getElementById('btn-lib-ter');
            const textoPrevio = btn.innerText;
            btn.innerText = "⏳...";

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // 1. Buscamos primero si hay alguien ocupando una mesa manualmente
                let mesaOcupadaManualmente = todasLasMesas.find(mesa => mesa.zona === zona && mesa.estado_actual === 'ocupada');
                
                if (mesaOcupadaManualmente) {
                    // Si la hay, la marcamos como libre
                    await supabase.from('mesas').update({ estado_actual: 'libre' }).eq('id', mesaOcupadaManualmente.id);
                } else {
                    // 2. Si no hay gente de paso, buscamos si hay una reserva que esté estorbando AHORA MISMO
                    const ahora = new Date();
                    const hoyIso = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;
                    
                    let reservaQueEstorba = reservasDeHoy.find(r => {
                        let mesaVinculada = todasLasMesas.find(m => m.id === r.mesa_id);
                        if (!mesaVinculada || mesaVinculada.zona !== zona) return false;
                        
                        let horaDeReserva = new Date(`${hoyIso}T${r.hora_inicio}`);
                        return Math.abs((ahora - horaDeReserva) / 60000) < 150; 
                    });

                    if (reservaQueEstorba) {
                        // Borramos la reserva de internet para hacer hueco (los que reservaron ya se han ido)
                        await supabase.from('reservas').delete().eq('id', reservaQueEstorba.id);
                    } else {
                        btn.innerText = textoPrevio;
                        return alert(`⚠️ Ya están todas las mesas de ${zona} completamente vacías.`);
                    }
                }
                
                await actualizarDatos();
            } catch (error) {
                alert("❌ Fallo de red. Inténtalo de nuevo.");
            }
            btn.innerText = textoPrevio;
        }

        async function descargarListaReservas() {
            const fechaElegida = document.getElementById('input-fecha-lista').value;
            const caja = document.getElementById('caja-reservas');
            caja.innerHTML = '<p class="text-center font-bold text-yellow-400">Descargando reservas...</p>';

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                const { data: reservasDato, error } = await supabase
                    .from('reservas')
                    .select('hora_inicio, nombre_cliente, telefono_cliente, codigo_secreto, mesas(zona)')
                    .eq('fecha', fechaElegida)
                    .order('hora_inicio', { ascending: true });

                if (error) throw error;

                if (!reservasDato || reservasDato.length === 0) {
                    caja.innerHTML = `<div class="bg-gray-800 p-6 rounded-xl border border-gray-600 text-center"><p class="text-xl font-bold text-gray-400">No hay reservas para este día.</p></div>`;
                    return;
                }

                let contenidoHTML = "";
                reservasDato.forEach(res => {
                    let horaLimpia = res.hora_inicio.substring(0, 5);
                    let zona = res.mesas ? res.mesas.zona : "Sin zona";
                    let color = zona === 'Interior' ? 'text-blue-400' : 'text-orange-400';

                    contenidoHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl border-l-4 border-yellow-400 mb-3 shadow">
                            <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-2">
                                <span class="text-2xl font-black text-yellow-400">${horaLimpia}</span>
                                <span class="text-lg font-black uppercase ${color}">${zona}</span>
                            </div>
                            <p class="text-xl font-black text-white uppercase">${res.nombre_cliente}</p>
                            <p class="text-gray-400 font-bold">📞 ${res.telefono_cliente}</p>
                            <p class="text-gray-500 text-sm mt-1">Ref: ${res.codigo_secreto}</p>
                        </div>
                    `;
                });

                caja.innerHTML = contenidoHTML;

            } catch (error) {
                caja.innerHTML = '<p class="text-center font-bold text-red-500">❌ Error de conexión al descargar reservas.</p>';
            }
        }

        setInterval(actualizarDatos, 5000);
        setTimeout(actualizarDatos, 500);

    </script>
</body>
</html>
