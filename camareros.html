<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camareros - Restaurante de Pablo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans select-none pb-10">

    <header class="bg-black py-4 px-6 flex justify-between items-center border-b-2 border-gray-700 sticky top-0 z-50">
        <h1 class="text-2xl font-black uppercase text-yellow-400">Terminal Camareros</h1>
        <span class="text-green-400 font-bold text-sm flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-ping inline-block"></span> En Vivo
        </span>
    </header>

    <main class="p-4 max-w-6xl mx-auto">
        <!-- ZONAS -->
        <h2 class="text-xl font-bold uppercase mb-2 text-blue-300 mt-4">Interior (1-20)</h2>
        <div id="grid-interior" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-10 gap-2 mb-6"></div>

        <h2 class="text-xl font-bold uppercase mb-2 text-orange-300">Terraza (21-30)</h2>
        <div id="grid-terraza" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-10 gap-2 mb-6"></div>

        <h2 class="text-xl font-bold uppercase mb-2 text-purple-300">Segunda Planta (31-40)</h2>
        <div id="grid-planta-alta" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-10 gap-2 mb-6"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ncxrtpmndkmgegtkasub.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_05L29aUddOhhWdeH7qZiqg_3Xq_EKjC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mesas = [];
        let reservasDeHoy = [];

        async function cargarDatos() {
            // 1. Cargar Mesas
            const { data: dataMesas } = await supabase.from('mesas').select('*').order('numero_mesa', { ascending: true });
            mesas = dataMesas || [];

            // 2. Cargar Reservas de HOY que no estén canceladas
            const hoy = new Date().toISOString().split('T')[0];
            const { data: dataReservas } = await supabase.from('reservas').select('*').eq('fecha', hoy).eq('estado', 'pendiente');
            reservasDeHoy = dataReservas || [];

            pintarMesas();
            comprobarCaducadas(); // Revisar si hay alguna que desbloquear automáticamente
        }

        function pintarMesas() {
            ['interior', 'terraza', 'planta-alta'].forEach(id => document.getElementById(`grid-${id}`).innerHTML = '');

            mesas.forEach(mesa => {
                const btn = document.createElement('button');
                btn.className = `h-20 w-full rounded-lg font-black border-2 shadow flex flex-col items-center justify-center transition active:scale-95`;
                
                // Buscar si tiene una reserva hoy próxima
                const reservaMesa = reservasDeHoy.find(r => r.mesa_id === mesa.id);
                let horaReservaHtml = '';

                if (mesa.estado_actual === 'libre') {
                    btn.classList.add('bg-green-600', 'border-green-800', 'text-white');
                    // Si está libre pero tiene reserva más tarde, lo avisamos
                    if(reservaMesa) horaReservaHtml = `<span class="text-[10px] bg-black px-1 rounded mt-1">Res: ${reservaMesa.hora_inicio.substring(0,5)}</span>`;
                } else if (mesa.estado_actual === 'ocupada') {
                    btn.classList.add('bg-red-600', 'border-red-900', 'text-white');
                } else if (mesa.estado_actual === 'reservada') {
                    btn.classList.add('bg-yellow-400', 'border-yellow-600', 'text-black');
                    if(reservaMesa) horaReservaHtml = `<span class="text-[10px] bg-black text-white px-1 rounded mt-1">Llegan: ${reservaMesa.hora_inicio.substring(0,5)}</span>`;
                }

                btn.innerHTML = `<span class="text-2xl">${mesa.numero_mesa}</span> ${horaReservaHtml}`;
                btn.onclick = () => accionarMesa(mesa, reservaMesa);

                if(mesa.zona === 'Interior') document.getElementById('grid-interior').appendChild(btn);
                if(mesa.zona === 'Terraza') document.getElementById('grid-terraza').appendChild(btn);
                if(mesa.zona === 'Segunda Planta') document.getElementById('grid-planta-alta').appendChild(btn);
            });
        }

        async function accionarMesa(mesa, reserva) {
            let nuevoEstado = null;

            if (mesa.estado_actual === 'libre') {
                if(confirm(`Mesa ${mesa.numero_mesa}: ¿Sentar a alguien de paso? (Pasa a OCUPADA)`)) nuevoEstado = 'ocupada';
            } 
            else if (mesa.estado_actual === 'ocupada') {
                if(confirm(`Mesa ${mesa.numero_mesa}: ¿Han pagado y se han ido? (Pasa a LIBRE)`)) nuevoEstado = 'libre';
            } 
            else if (mesa.estado_actual === 'reservada') {
                const mensaje = reserva ? `Mesa ${mesa.numero_mesa} reservada a las ${reserva.hora_inicio.substring(0,5)}.\n\n¿Han llegado los clientes?` : `Mesa ${mesa.numero_mesa}: ¿Han llegado los clientes?`;
                if(confirm(mensaje)) {
                    nuevoEstado = 'ocupada';
                    if(reserva) await supabase.from('reservas').update({ estado: 'asistida' }).eq('id', reserva.id);
                } else {
                    if(confirm(`¿Quieres marcar la Mesa ${mesa.numero_mesa} como libre? (El cliente no vino)`)) {
                        nuevoEstado = 'libre';
                        if(reserva) await supabase.from('reservas').update({ estado: 'no_presentado' }).eq('id', reserva.id);
                    }
                }
            }

            if (nuevoEstado) {
                await supabase.from('mesas').update({ estado_actual: nuevoEstado }).eq('id', mesa.id);
                cargarDatos(); // Recargar todo tras el cambio
            }
        }

        // ==========================================
        // AUTO-DESBLOQUEO DE MESAS (Se ejecuta cada minuto)
        // ==========================================
        async function comprobarCaducadas() {
            const ahora = new Date();
            
            for (let reserva of reservasDeHoy) {
                // Sacar la hora de la reserva y sumarle 1 hora (60 mins)
                const horaReservaDate = new Date(`${reserva.fecha}T${reserva.hora_inicio}`);
                const horaCaducidad = new Date(horaReservaDate.getTime() + (60 * 60000)); // +1 hora

                if (ahora >= horaCaducidad) {
                    // Ha pasado 1 hora. Comprobamos si la mesa sigue en estado 'reservada'
                    const mesaAfectada = mesas.find(m => m.id === reserva.mesa_id);
                    if (mesaAfectada && mesaAfectada.estado_actual === 'reservada') {
                        console.log(`Auto-desbloqueando Mesa ${mesaAfectada.numero_mesa}... Ha pasado 1 hora.`);
                        // Liberar mesa
                        await supabase.from('mesas').update({ estado_actual: 'libre' }).eq('id', mesaAfectada.id);
                        // Marcar reserva como no presentado
                        await supabase.from('reservas').update({ estado: 'no_presentado' }).eq('id', reserva.id);
                    }
                }
            }
        }
        setInterval(comprobarCaducadas, 60000); // 60.000 ms = 1 minuto

        // TIEMPO REAL: Si pasa algo en la web, recargamos la app del camarero
        supabase.channel('camareros-vivo')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'mesas' }, () => cargarDatos())
          .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas' }, () => cargarDatos())
          .subscribe();

        // Arranque Inicial
        cargarDatos();
    </script>
</body>
</html>
